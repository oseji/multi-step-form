<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        display: none;
      }
    </style>
    <link rel="stylesheet" href="css/output.css" />
    <title>Multi-step form</title>
  </head>
  <body>
    <div class="container">
      <!--STEPS-->
      <section
        class="steps-section"
        style="
          background-image: url(assets/images/bg-sidebar-desktop.svg);
          background-size: cover;
        "
      >
        <div class="step">
          <p class="step-number active-step" id="step-1">1</p>
          <div class="step-text-container">
            <h1 class="step-heading">Step 1</h1>
            <p class="step-text">Your info</p>
          </div>
        </div>

        <div class="step">
          <p class="step-number" id="step-2">2</p>
          <div class="step-text-container">
            <h1 class="step-heading">Step 2</h1>
            <p class="step-text">Select plan</p>
          </div>
        </div>

        <div class="step">
          <p class="step-number" id="step-3">3</p>
          <div class="step-text-container">
            <h1 class="step-heading">Step 3</h1>
            <p class="step-text">Add-ons</p>
          </div>
        </div>

        <div class="step">
          <p class="step-number" id="step-4">4</p>
          <div class="step-text-container">
            <h1 class="step-heading">Step 4</h1>
            <p class="step-text">Summary</p>
          </div>
        </div>
      </section>

      <!--FORM-->
      <section class="form-section">
        <h1 class="form-heading">Personal info</h1>
        <p class="form-sub-heading">
          Please provide your name,email address and phone number.
        </p>

        <form action="" class="step-1">
          <div class="input-line">
            <div class="flex justify-between">
              <label for="name">Name</label>
              <label class="error-label hidden"> This field is required </label>
            </div>

            <input type="text" placeholder="e.g. Stephen King" id="name" />
          </div>

          <div class="input-line">
            <div class="flex justify-between">
              <label for="email">Email Address</label>
              <label class="error-label hidden"> This field is required </label>
            </div>

            <input
              type="email"
              placeholder="e.g. Stephenking@lorem.com"
              id="email"
            />
          </div>

          <div class="input-line">
            <div class="flex justify-between">
              <label for="phone-number">Phone Number</label>
              <label class="error-label hidden"> This field is required </label>
            </div>

            <input
              type="number"
              placeholder="e.g. +234 48 1338 1293"
              id="phone-number"
            />
          </div>

          <div class="btn-grp">
            <button class="form-btn-prev hidden">Go Back</button>
            <button class="form-btn-next" id="next-one">Next Step</button>
          </div>
        </form>
      </section>
    </div>
    <script src="index.js"></script>
  </body>
</html>
